<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | ALT2TRAZ INTELLIGENCE PVT LTD</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-container">

        <div class="company-brand">
            <img src="assets/images/logo.png" alt="ALT2TRAZ Logo" class="company-logo">
            <div class="company-text">
                <h1>ALT2TRAZ</h1>
                <p>INTELLIGENCE PVT LTD</p>
            </div>
        </div>

        <div class="login-box">
            <h2>Welcome Back</h2>
            <p>Sign in to access your client portal</p>

            <div id="errorMessage" class="error-msg" style="display: none;"></div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter Email" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter Password" required>
                </div>

                <button type="submit" class="login-btn">
                    Sign In
                </button>
            </form>

            <div class="guest-divider">
                <span>or</span>
            </div>
            <button id="guestBtn" class="guest-btn">
                Continue as Guest
            </button>

            <div class="footer-link">
                Don't have an account?
                <a href="signup.html">Register</a>
            </div>
        </div>

    </div>

    <script src="js/login.js"></script>
</body>
</html>
