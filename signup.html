<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | ALT2TRAZ INTELLIGENCE PVT LTD</title>
    <link rel="stylesheet" href="css/signup.css">
</head>
<body>

    <div class="signup-container">

        <div class="company-brand">
            <img src="assets/images/logo.png" alt="ALT2TRAZ Logo" class="company-logo">
            <div class="company-text">
                <h1>ALT2TRAZ</h1>
                <p>INTELLIGENCE PVT LTD</p>
            </div>
        </div>

        <div class="signup-box">
            <h2>Create Account</h2>
            <p>Register to access your client portal</p>

         <form id="signupForm">
    <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter Username">
        <span class="error-msg" id="usernameError"></span>
    </div>

    <div class="input-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter Email">
        <span class="error-msg" id="emailError"></span>
    </div>

    <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Create Password">
        <span class="error-msg" id="passwordError"></span>
    </div>

    <div class="input-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm Password">
        <span class="error-msg" id="confirmError"></span>
    </div>

    <div id="formSummaryMessage" class="form-summary"></div>

    <button type="submit" class="signup-btn">
        Create Account
    </button>
</form>

            <div class="footer-link">
                Already have an account?
                <a href="login.html">Sign In</a>
            </div>

        </div>

    </div>

    <script src="js/signup.js"></script>
</body>
</html>
